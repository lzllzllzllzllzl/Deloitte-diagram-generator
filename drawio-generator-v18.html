> **使用方法**：将以下全部内容作为提示输入到任何 AI 环境中，它将生成完全符合 Deloitte 标准的流程图 XML。

## 任务

根据下面提供的【流程信息】，生成一个符合【德勤标准约束】的 Drawio XML 文件。

---

## 德勤标准约束（Strict Rules）

### 1. 布局结构

**泳道格式**：
- 使用**水平泳道**（horizontal=0）
- 角色名称**垂直显示**在泳道左侧
- 流程从**左向右**流动
- 每个泳道高度：90px
- 泳道宽度：1860px

**开始和结束位置**（关键！）：
- **开始和结束都在第一个泳道**（流程驱动泳道）
- 开始：放在第一个泳道的**最左边**（x=150）
- 结束：放在第一个泳道的**最右边**（x=1780）
- **不要**为开始和结束创建单独的泳道

**角色标签位置**：
- 在泳道的**左侧**
- 宽度：76px
- 位置：x=8, y=27
- 字体大小：16pt
- 颜色：白色

### 2. 活动编号

- 使用**两位数顺序编号**：01, 02, 03, 04...
- 活动框中显示格式：\`01&#xa;活动名称\`
- 编号**必须连续**，不能跳过任何数字
- 所有活动的编号顺序遵循流程流向

### 3. 颜色标准（Deloitte Standard - 必须严格遵守）

**画布背景**：
\`\`\`
background="#000000"（黑色）
\`\`\`

**泳道背景**：
\`\`\`
fillColor=#2A2A2A（深灰）
strokeColor=#CCCCCC（浅灰边框）
fontColor=#FFFFFF（白色文字）
\`\`\`

**活动框**：
\`\`\`
fillColor=#000000（黑色填充）
strokeColor=#FFFFFF（白色边框）
fontColor=#FFFFFF（白色文字）
strokeWidth=2（2像素边框）
fontSize=16（16号字体）
\`\`\`

**系统/数据源（绿色）**：
\`\`\`
fillColor=#D1EDA0（浅绿填充）
strokeColor=#00AA00（深绿边框）
fontColor=#000000（黑色文字）
fontSize=12（12号字体）
fontStyle=1（粗体）
shape=cloud（云朵形状）
size=0.5（云朵大小）
\`\`\`

**文档/输出（黄色）**：
\`\`\`
fillColor=#FFC000（金色填充）
strokeColor=#FFD700（亮金边框）
fontColor=#000000（黑色文字）
fontSize=12（12号字体）
fontStyle=1（粗体）
shape=document（文档形状）
size=0.15（文档翻页效果）
\`\`\`

**决策点（菱形）**：
\`\`\`
fillColor=#000000（黑色填充）
strokeColor=#FFFFFF（白色边框）
fontColor=#FFFFFF（白色文字）
strokeWidth=2（2像素边框）
fontSize=16（16号字体）
shape=rhombus（菱形）
\`\`\`

**开始/结束（圆角矩形）**：
\`\`\`
fillColor=#000000（黑色填充）
strokeColor=#FFFFFF（白色边框）
fontColor=#FFFFFF（白色文字）
strokeWidth=2（2像素边框）
fontSize=12（12号字体）
rounded=1（圆角）
\`\`\`

**决策标签**：
\`\`\`
是（Yes）：fontColor=#00FF00（绿色），fontStyle=1（粗体）
否（No）：fontColor=#FF0000（红色），fontStyle=1（粗体）
fontSize=13（13号字体）
\`\`\`

### 4. 文档位置规则（Critical - 必须严格遵守）

**系统输入（绿色）**：
- 位置：**放在活动框的 TOP（上方）**
- y坐标：-15（在活动框上方）
- 与活动框水平对齐

**文档输入（黄色，从其他活动流入本活动）**：
- 位置：**放在活动框的 TOP（上方）**
- y坐标：-15
- 与系统输入相同位置

**文档输出（黄色）**：

| 文档类型 | 位置 | y坐标 | 说明 |
|---------|------|-------|------|
| **流转给下游** | RIGHT（右侧） | 65 | 从活动框右侧向右偏移 |
| **最终产物/归档** | BOTTOM（下方） | 85 | 在活动框下方 |

**具体规则**：
- 如果文档从本活动**流向下一个活动** → 放在 **RIGHT**
- 如果文档是**最终报告/归档记录** → 放在 **BOTTOM**
- 如果不确定，分析文档的下游去向

### 5. 连接规则（Edge Routing - 关键！）

**正交路由（必须）**：
\`\`\`
edgeStyle=orthogonalEdgeStyle
\`\`\`

**禁止斜线** - 所有边必须是 90度转弯

**出口点（Exit Points）**：
\`\`\`
右侧出口：exitX=1;exitY=0.5;exitDx=0;exitDy=0
底部出口：exitX=0.5;exitY=1;exitDx=0;exitDy=0
顶部出口：exitX=0.5;exitY=0;exitDx=0;exitDy=0
左侧出口：exitX=0;exitY=0.5;exitDx=0;exitDy=0
\`\`\`

**入口点（Entry Points）**：
\`\`\`
左侧入口：entryX=0;entryY=0.5;entryDx=0;entryDy=0
顶部入口：entryX=0.5;entryY=0;entryDx=0;entryDy=0
底部入口：entryX=0.5;entryY=1;entryDx=0;entryDy=0
右侧入口：entryX=1;entryY=0.5;entryDx=0;entryDy=0
\`\`\`

**边样式**：
\`\`\`
rounded=0
orthogonalLoop=1
jettySize=auto
html=1
strokeColor=#FFFFFF（白色）
strokeWidth=2（2像素）
\`\`\`

**路径点（Waypoints - 避免交叉）**：
当边需要绕过其他元素时，使用 \`<Array as="points">\` 添加路径点。

### 6. 决策点

**形状**：菱形（rhombus）

**大小**：130 x 75 像素

**出口**（必须有两个）：
- Yes（是）→ 通常向右或向下
- No（否）→ 通常向左或向上返回

**标签位置**：
- "是"标签：放在菱形的右侧
- "否"标签：放在菱形的下方

### 7. XML 结构（必须遵循）

**文件骨架**：
\`\`\`xml
<?xml version="1.0" encoding="UTF-8"?>
<mxfile host="Electron">
  <diagram name="[流程名称]" id="[流程ID]">
    <mxGraphModel dx="1600" dy="1000" grid="0" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1920" pageHeight="1080" background="#000000" math="0" shadow="0">
      <root>
        <mxCell id="0" />
        <mxCell id="1" parent="0" />

        <!-- 所有元素在这里 -->

      </root>
    </mxGraphModel>
  </diagram>
</mxfile>
\`\`\`

**关键属性**：
- \`id="0"\` 和 \`id="1"\` 是必需的根节点
- 用户元素从 \`id="2"\` 开始递增
- 所有文本使用 \`html=1\`
- 多行文本使用 \`&#xa;\`（换行符）
- 背景色在 \`<mxGraphModel>\` 中设置

## 自检清单（生成后必须验证）

在生成 XML 后，请检查以下项目：

### 布局检查
- [ ] 所有活动都有编号（01, 02, 03...），无跳号
- [ ] 开始和结束都在**第一个泳道**（流程驱动泳道）
- [ ] 角色标签都在泳道的左侧
- [ ] 所有泳道高度一致（90px）
- [ ] 所有泳道宽度一致（1860px）

### 颜色检查
- [ ] 画布背景是黑色（#000000）
- [ ] 泳道背景是深灰（#2A2A2A）
- [ ] 活动框是黑色填充 + 白色边框
- [ ] 系统输入是绿色（#D1EDA0）
- [ ] 文档是黄色（#FFC000）
- [ ] 决策点是黑色菱形 + 白色边框

### 位置检查
- [ ] 系统输入（绿色）在活动框的 **TOP**（上方，y=-15）
- [ ] 流转文档（黄色）在活动框的 **RIGHT**（右侧，y=65）
- [ ] 归档文档（黄色）在活动框的 **BOTTOM**（下方，y=85）
- [ ] 决策标签"是"在菱形右侧
- [ ] 决策标签"否"在菱形下方

### 连接检查
- [ ] 所有边都是正交路由（90度转弯）
- [ ] **没有交叉的边**
- [ ] 所有出口和入口点都正确定义
- [ ] 异常路径（No分支）使用路径点避免交叉
- [ ] 边的颜色是白色（#FFFFFF）
- [ ] 边的宽度是2像素

### XML 格式检查
- [ ] XML 声明正确：\`<?xml version="1.0" encoding="UTF-8"?>\`
- [ ] 根节点存在：\`id="0"\` 和 \`id="1"\`
- [ ] 所有文本使用 \`html=1\`
- [ ] 多行文本使用 \`&#xa;\`
- [ ] 所有 ID 唯一，无重复

### 功能检查
- [ ] 决策点都有两个出口（Yes 和 No）
- [ ] 所有活动都被连接
- [ ] 流程可以从开始流向结束
- [ ] 异常路径可以返回到正确的活动

## 常见错误和解决方案

| 问题 | 原因 | 解决方案 |
|------|------|---------|
| 边交叉 | 路径规划不当 | 添加路径点（waypoints）绕过元素 |
| 编号错误 | 跳过数字 | 重新编号，确保连续 |
| 颜色错误 | 未遵循标准 | 使用上面指定的颜色代码 |
| 缺少决策标签 | 忘记添加 | 添加"是"和"否"标签 |
| 活动未编号 | 忘记编号 | 为每个活动添加编号 |
| 开始/结束在单独泳道 | 创建了空白泳道 | 移动到第一个泳道 |
| 文档位置错误 | 未分析文档流向 | 根据是流转还是归档决定位置 |
| 斜线 | 未使用正交路由 | 使用 edgeStyle=orthogonalEdgeStyle |
| 文字被裁剪 | 框太小 | 增加宽度/高度 |
| 形状重叠 | 间距不够 | 分开 200px 以上

// ========== Draw.io 通信 ==========
window.addEventListener("message",(e)=>{
  try{
    const m=typeof e.data==='string'?JSON.parse(e.data):e.data;
    if(m.event==="init"){
      drawioReady=true;
      document.getElementById('pvSt').textContent='就绪';
      if(pendingXML){sendXML(pendingXML);pendingXML=null;}
    }
    if(m.event==="load"){
      document.getElementById('pvSt').textContent='已加载';
    }
  }catch(x){}
});

function initDrawIO(){
  document.getElementById('drawioFrame').src="https://embed.diagrams.net/?embed=1&proto=json&ui=atlas&spin=1";
}

function sendXML(xml){
  if(!drawioReady){pendingXML=xml;return;}
  document.getElementById('drawioFrame').contentWindow.postMessage(JSON.stringify({action:"load",xml:xml}),"*");
  document.getElementById('pvSt').textContent='已加载';
}

// ========== 模板加载 ==========
function loadTmpl(){
  const sel = document.getElementById('tmplSel').value;
  if(!sel || sel==='custom'){
    document.getElementById('processInfo').value = '';
    return;
  }

  const tmpl = TEMPLATES[sel];
  if(!tmpl) return;

  document.getElementById('pCode').value = tmpl.code;
  document.getElementById('pName').value = tmpl.name;
  document.getElementById('canvasSize').value = tmpl.canvas;
  document.getElementById('processInfo').value = tmpl.info;
}

// ========== 表单渲染 ==========
function render(){
  const c=document.getElementById('slCont');
  c.innerHTML='';
  FD.swimlanes.forEach((s,i)=>{
    const e=document.createElement('div');
    e.className='sl-c exp';
    e.id=s.id;
    e.innerHTML=`
      <div class="sl-h" onclick="togS('${s.id}')">
        <div class="sl-hl">
          <div class="sl-i">${i+1}</div>
          <span class="sl-n">${s.name}</span>
          <span class="sl-cnt">(${s.acts.length})</span>
        </div>
        <div class="sl-a">
          <button class="btn bs" onclick="event.stopPropagation();addA('${s.id}')">+</button>
          <button class="btn bs" onclick="event.stopPropagation();rmS('${s.id}')" style="color:var(--e)">×</button>
        </div>
      </div>
      <div class="sl-b">
        <div class="al">${s.acts.map(a=>rA(s.id,a)).join('')}</div>
      </div>
    `;
    c.appendChild(e);
  });
}

function rA(sid,a){
  return `
    <div class="ai ${a.id}" id="${a.id}">
      <div class="ai-h" onclick="togA('${a.id}')">
        <div class="ai-hl">
          <span class="ai-n">${a.num}</span>
          <span class="ai-nm">${a.name}</span>
        </div>
        <button class="btn bs" onclick="event.stopPropagation();rmA('${sid}','${a.id}')" style="color:var(--e)">×</button>
      </div>
      <div class="ai-b">
        <div class="fg">
          <label>名称</label>
          <input type="text" value="${a.name}" onchange="updN('${a.id}',this.value)">
        </div>
        <div class="ds">
          <h5><span class="d i"></span> 系统</h5>
          <div>
            ${a.sys.map(d=>`<span class="dt i">💻 ${d}<span class="rm" onclick="rmD('${a.id}','sys','${d}')">×</span></span>`).join('')}
            <button class="btn bs" onclick="addD('${a.id}','sys')">+</button>
          </div>
        </div>
        <div class="ds">
          <h5><span class="d i"></span> 输入文档</h5>
          <div>
            ${a.docInp.map(d=>`<span class="dt i">📄 ${d}<span class="rm" onclick="rmD('${a.id}','docInp','${d}')">×</span></span>`).join('')}
            <button class="btn bs" onclick="addD('${a.id}','docInp')">+</button>
          </div>
        </div>
        <div class="ds">
          <h5><span class="d o"></span> 输出文档</h5>
          <div>
            ${a.docOut.map(d=>`<span class="dt o">📄 ${d}<span class="rm" onclick="rmD('${a.id}','docOut','${d}')">×</span></span>`).join('')}
            <button class="btn bs" onclick="addD('${a.id}','docOut')">+</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function togS(id){document.getElementById(id).classList.toggle('exp')}
function togA(id){document.getElementById(id).classList.toggle('exp')}
function addRole(){
  const i=document.getElementById('nRole');
  if(i.value.trim()){
    FD.swimlanes.push({id:'s'+Date.now(),name:i.value.trim(),acts:[]});
    render();
    i.value='';
  }
}
function rmS(id){FD.swimlanes=FD.swimlanes.filter(s=>s.id!==id);render()}
function addA(sid){
  const s=FD.swimlanes.find(s=>s.id===sid);
  if(s){
    s.acts.push({
      id:'a'+Date.now(),
      num:(s.acts.length+1).toString().padStart(2,'0'),
      name:'新活动',
      sys:[],
      docInp:[],
      docOut:[]
    });
    render();
  }
}
function rmA(sid,aid){
  const s=FD.swimlanes.find(s=>s.id===sid);
  if(s){
    s.acts=s.acts.filter(a=>a.id!==aid);
    s.acts.forEach((a,i)=>a.num=(i+1).toString().padStart(2,'0'));
    render();
  }
}
function updN(aid,n){
  for(const s of FD.swimlanes){
    const a=s.acts.find(a=>a.id===aid);
    if(a){a.name=n;break;}
  }
}
function addD(aid,t){
  const n=prompt('请输入名称:');
  if(n){
    for(const s of FD.swimlanes){
      const a=s.acts.find(a=>a.id===aid);
      if(a){a[t].push(n);render();break;}
    }
  }
}
function rmD(aid,t,n){
  for(const s of FD.swimlanes){
    const a=s.acts.find(a=>a.id===aid);
    if(a){a[t]=a[t].filter(d=>d!==n);render();break;}
  }
}

// ========== 从表单生成（简单版本，不经过AI）==========
function genFromForm(){
  FD.pCode=document.getElementById('pCode').value;
  FD.pName=document.getElementById('pName').value;

  let xml=`<?xml version="1.0" encoding="UTF-8"?>\n<mxfile host="app.diagrams.net"><diagram name="${FD.pCode} ${FD.pName}" id="custom"><mxGraphModel dx="1500" dy="900" grid="0" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1800" pageHeight="1000" background="#000000" math="0" shadow="0"><root><mxCell id="0"/><mxCell id="1" parent="0"/><mxCell id="title" parent="1" style="text;html=1;fontSize=18;fontStyle=1;align=center;fontColor=#FFFFFF;" value="${FD.pCode} ${FD.pName}" vertex="1"><mxGeometry height="30" width="400" x="700" y="10" as="geometry"/></mxCell>`;

  let laneY=50,actNum=1;
  FD.swimlanes.forEach((sl,si)=>{
    const lid=`lane${si+1}`;
    xml+=`<mxCell id="${lid}" parent="1" style="shape=swimlane;startSize=80;horizontal=0;swimlaneLine=1;fillColor=#2A2A2A;strokeColor=#CCCCCC;fontColor=#FFFFFF;fontSize=11;" value="" vertex="1"><mxGeometry height="90" width="1570" x="30" y="${laneY}" as="geometry"/></mxCell>`;
    xml+=`<mxCell id="role${si+1}" parent="${lid}" style="text;whiteSpace=wrap;fontColor=#FFFFFF;fontSize=16;" value="${sl.name}" vertex="1"><mxGeometry height="50" width="76" x="8" y="20" as="geometry"/></mxCell>`;

    if(si===0){
      xml+=`<mxCell id="start" parent="${lid}" style="rounded=1;whiteSpace=wrap;fillColor=#000000;strokeColor=#FFFFFF;fontColor=#FFFFFF;strokeWidth=2;fontSize=12;" value="开始" vertex="1"><mxGeometry height="40" width="80" x="150" y="25" as="geometry"/></mxCell>`;
      xml+=`<mxCell id="end" parent="${lid}" style="rounded=1;whiteSpace=wrap;fillColor=#000000;strokeColor=#FFFFFF;fontColor=#FFFFFF;strokeWidth=2;fontSize=12;" value="结束" vertex="1"><mxGeometry height="40" width="80" x="1490" y="25" as="geometry"/></mxCell>`;
    }

    let actX=300;
    sl.acts.forEach(act=>{
      const actId=`act${actNum}`;
      xml+=`<mxCell id="${actId}" parent="${lid}" style="rounded=0;whiteSpace=wrap;fillColor=#000000;strokeColor=#FFFFFF;fontColor=#FFFFFF;strokeWidth=2;fontSize=16;" value="${actNum.toString().padStart(2,'0')}&#10;${act.name}" vertex="1"><mxGeometry height="50" width="180" x="${actX}" y="20" as="geometry"/></mxCell>`;

      // 系统标签（绿色，TOP）
      act.sys.forEach((s,si)=>{
        xml+=`<mxCell id="sys${actNum}_${si}" parent="${lid}" style="shape=cloud;whiteSpace=wrap;fillColor=#D1EDA0;strokeColor=#00AA00;fontColor=#000000;fontSize=12;fontStyle=1;size=0.5;" value="💻 ${s}" vertex="1"><mxGeometry height="35" width="100" x="${actX+40}" y="-15" as="geometry"/></mxCell>`;
      });

      // 输入文档（黄色，TOP）
      act.docInp.forEach((d,di)=>{
        xml+=`<mxCell id="dinp${actNum}_${di}" parent="${lid}" style="shape=document;whiteSpace=wrap;fillColor=#FFC000;strokeColor=#FFD700;fontColor=#000000;fontSize=12;fontStyle=1;size=0.15;" value="📄 ${d}" vertex="1"><mxGeometry height="29" width="100" x="${actX+40}" y="-15" as="geometry"/></mxCell>`;
      });

      // 输出文档（黄色，BOTTOM）
      act.docOut.forEach((d,di)=>{
        xml+=`<mxCell id="dout${actNum}_${di}" parent="${lid}" style="shape=document;whiteSpace=wrap;fillColor=#FFC000;strokeColor=#FFD700;fontColor=#000000;fontSize=12;fontStyle=1;size=0.15;" value="📄 ${d}" vertex="1"><mxGeometry height="29" width="100" x="${actX+40}" y="75" as="geometry"/></mxCell>`;
      });

      actX+=280;
      actNum++;
    });
    laneY+=100;
  });

  // 简单连线
  for(let i=1;i<actNum;i++){
    xml+=`<mxCell id="e${i}" edge="1" parent="1" source="act${i}" target="act${i+1}" style="edgeStyle=orthogonalEdgeStyle;strokeColor=#FFFFFF;strokeWidth=2;"><mxGeometry relative="1" as="geometry"/></mxCell>`;
  }
  if(actNum>1){
    xml+=`<mxCell id="eStart" edge="1" parent="1" source="start" target="act1" style="edgeStyle=orthogonalEdgeStyle;strokeColor=#FFFFFF;strokeWidth=2;"><mxGeometry relative="1" as="geometry"/></mxCell>`;
    xml+=`<mxCell id="eEnd" edge="1" parent="1" source="act${actNum-1}" target="end" style="edgeStyle=orthogonalEdgeStyle;strokeColor=#FFFFFF;strokeWidth=2;"><mxGeometry relative="1" as="geometry"/></mxCell>`;
  }

  xml+=`</root></mxGraphModel></diagram></mxfile>`;

  XML=xml;
  document.getElementById('xmlOut').value=XML;
  document.getElementById('xmlInfo').textContent='从表单生成';
  sendXML(XML);
}

// ========== AI 生成（流程信息 + Deloitte 规范）==========
async function genWithAI(){
  const k=document.getElementById('apiKey').value.trim();
  const processInfo=document.getElementById('processInfo').value.trim();

  if(!k){alert('请输入 API Key');return;}
  if(!processInfo){alert('请输入流程信息（或选择模板）');return;}

  const sd=document.getElementById('stDot'),st=document.getElementById('stTxt');
  sd.classList.add('ld');st.textContent='AI 生成中...';

  try{
    // 构建完整提示词：任务 + 流程信息 + Deloitte 规范
    const fullPrompt = `## 任务

根据下面提供的【流程信息】，生成一个符合【德勤标准约束】的 Draw.io XML 文件。

---

## 流程信息

${processInfo}

---

## 德勤标准约束（必须严格遵守）

${DELOITTE_SKILLS.replace('# 德勤标准 Drawio XML 生成 - 完整约束输入模板\n\n> **使用方法**：将以下全部内容作为提示输入到任何 AI 环境中，它将生成完全符合 Deloitte 标准的流程图 XML。\n\n---\n\n## 任务\n\n根据下面提供的【流程信息】，生成一个符合【德勤标准约束】的 Drawio XML 文件。\n\n---\n\n','')}`;

    const r=await fetch('https://api.xiaomimimo.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','api-key':k},
      body:JSON.stringify({
        model:'mimo-v2.5',
        messages:[
          {role:'system',content:'你是 Draw.io XML 生成专家，精通 Deloitte 标准流程图规范。请严格按照提供的流程信息和规范生成 XML。只输出 XML，不要有任何额外说明。'},
          {role:'user',content:fullPrompt}
        ],
        max_completion_tokens:16384,
        temperature:0.7
      })
    });

    if(!r.ok)throw new Error(await r.text());
    const d=await r.json();
    const xml=d.choices[0].message.content.match(/<mxfile[\s\S]*<\/mxfile>/);

    if(xml){
      XML=xml[0];
      document.getElementById('xmlOut').value=XML;
      document.getElementById('xmlInfo').textContent='AI 已生成';
      sendXML(XML);
    } else {
      throw new Error('AI 未返回有效 XML');
    }

    sd.classList.remove('ld');sd.style.background='var(--ok)';st.textContent='已生成';
  }catch(e){
    alert(`AI 失败: ${e.message}`);
    sd.classList.remove('ld');sd.style.background='var(--e)';st.textContent='错误';
  }
}

// ========== 下载/复制 ==========
function dl(){
  if(!XML){alert('请先生成 XML');return;}
  const b=new Blob([XML],{type:'application/xml'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;
  a.download=`${document.getElementById('pCode').value}_${document.getElementById('pName').value}.drawio`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(u);
}

function cp(){
  navigator.clipboard.writeText(document.getElementById('xmlOut').value).then(()=>alert('已复制到剪贴板'));
}

document.addEventListener('DOMContentLoaded',()=>{
  init();
  render();
  setTimeout(initDrawIO,500);

  // 加载默认模板
  loadTmpl();
});
